<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Meteo Cosuenda</title>

<link rel="stylesheet" href="style.css">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1e3c72">

</head>

<body>

<header>
<h1>Meteo Cosuenda</h1>
</header>

<div class="container">

<div class="card">
<h2>Temperatura</h2>
<div id="tempBig" class="bigTemp">--°</div>
<p id="sensacion">Sensación térmica: --</p>
<p id="tempMin">Mínima diaria: --</p>
<p id="tempMax">Máxima diaria: --</p>
</div>

<div class="card">
<h2>Humedad</h2>
<div id="hum" class="bigNumber">--</div>
</div>

<div class="card">
<h2>Viento</h2>
<div id="windValue" class="bigNumber">--</div>
<p id="windDirText"></p>
<p id="windMax">Racha máxima diaria: --</p>

<div class="rosa">

<div id="flechaViento" class="flecha"></div>

<div class="cardinal norte">N</div>
<div class="cardinal sur">S</div>
<div class="cardinal este">E</div>
<div class="cardinal oeste">W</div>

<div class="cardinal noreste">NE</div>
<div class="cardinal sureste">SE</div>
<div class="cardinal suroeste">SW</div>
<div class="cardinal noroeste">NW</div>

</div>

</div>

<div class="card">
<h2>Lluvia</h2>
<p>Hoy: <span id="rain">--</span></p>
<p>Mes: <span id="rainMonth">--</span></p>
</div>

<div class="card">
<h2>Presión</h2>
<div id="press" class="bigNumber">--</div>
</div>

<div class="card">
<h2>Radiación</h2>
<p>UV: <span id="uv"></span></p>
<p>Solar: <span id="solar"></span></p>
</div>

</div>

<div id="ultimaActualizacion"></div>

<script src="script.js"></script>

<script>
if ("serviceWorker" in navigator) {
navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tiempo Cosuenda</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Estación Meteorológica Cosuenda</h1>
</header>

<main>
  <div class="temperaturas">
    <div id="tempBig" class="tempBig">--°</div>
    <div id="sensacion">Sensación térmica: --°</div>
    <div id="tempMin" class="tempMin">Mínima diaria: --°</div>
    <div id="tempMax" class="tempMax">Máxima diaria: --°</div>
  </div>

  <div class="otros-datos">
    <div>Humedad: <span id="hum">--</span>%</div>
    <div>Viento: <span id="windValue">--</span> km/h</div>
    <div id="windDirText">Dirección: --</div>
    <div>Racha máxima diaria: <span id="windMax">--</span> km/h</div>
    <div>Lluvia diaria: <span id="rain">--</span> mm</div>
    <div>Lluvia mensual: <span id="rainMonth">--</span> mm</div>
    <div>Presión: <span id="press">--</span> hPa</div>
    <div>Radiación solar: <span id="solar">--</span> W/m²</div>
    <div>UV: <span id="uv">--</span></div>
  </div>

  <div id="ultimaActualizacion">Última actualización: --</div>
</main>

<script src="script.js"></script>
</body>
</html>

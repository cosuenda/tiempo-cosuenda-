<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Meteo Cosuenda</title>

<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#1e3c72">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body class="temp-bg">

<header>
<h1>Meteo Cosuenda</h1>
</header>

<div class="container">

<div class="card">
<h2>Temperatura</h2>
<div id="tempBig" class="bigTemp">--°</div>
<p id="sensacion"></p>
<p id="tempMin"></p>
<p id="tempMax"></p>
</div>

<div class="card">
<h2>Humedad</h2>
<div id="hum" class="bigNumber">--</div>
</div>

<div class="card">

<h2>Viento</h2>

<div class="rosa">

<div class="cardinal norte">N</div>
<div class="cardinal noreste">NE</div>
<div class="cardinal este">E</div>
<div class="cardinal sureste">SE</div>
<div class="cardinal sur">S</div>
<div class="cardinal suroeste">SW</div>
<div class="cardinal oeste">W</div>
<div class="cardinal noroeste">NW</div>

<div id="flechaViento" class="flecha"></div>

</div>

<div id="windValue" class="bigNumber">-- km/h</div>
<p id="windDirText"></p>

</div>

<div class="card">
<h2>Racha máxima</h2>
<div id="windMaxBig" class="bigNumber">-- km/h</div>
</div>

<div class="card rainCard">

<h2>Lluvia</h2>

<div class="rainBars">

<div class="rainDay">
<span>Hoy</span>
<div class="bar" id="rain"></div>
<span class="value" id="rainValue">-- mm</span>
</div>

<div class="rainMonth">
<span>Mes</span>
<div class="bar" id="rainMonth"></div>
<span class="value" id="rainMonthValue">-- mm</span>
</div>

<div class="rainYear">
<span>Año</span>
<div class="bar" id="rainYear"></div>
<span class="value" id="rainYearValue">-- mm</span>
</div>

</div>

</div>

<div class="card">
<h2>Presión</h2>
<div id="press" class="bigNumber">--</div>
</div>

<div class="card">
<h2>Radiación</h2>
<p>UV: <span id="uv"></span></p>
<p>Solar: <span id="solar"></span></p>
</div>

<div class="card grafCard">

<h2>Temperatura últimas horas</h2>

<canvas id="grafTemp"></canvas>

</div>

<div id="ultimaActualizacion"></div>

</div>

<script src="script.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Meteo Cosuenda</title>

<link rel="stylesheet" href="style.css">

</head>

<body class="temp-bg">

<h1>Meteo Cosuenda (Tiempo Real)</h1>

<div class="panel">

<div class="temp-box">
<div id="temperatura" class="temperatura">--°C</div>
<div id="humedad" class="humedad">-- %</div>
</div>

<div class="viento-box">

<div class="rosa">

<div class="cardinal norte">N</div>
<div class="cardinal noreste">NE</div>
<div class="cardinal este">E</div>
<div class="cardinal sureste">SE</div>
<div class="cardinal sur">S</div>
<div class="cardinal suroeste">SO</div>
<div class="cardinal oeste">O</div>
<div class="cardinal noroeste">NO</div>

<div id="flecha" class="flecha"></div>

</div>

<div id="viento" class="viento">--</div>

</div>

<div class="extra">

<div>☀️ Radiación: <span id="solar">--</span></div>
<div>🔆 UV: <span id="uv">--</span></div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>

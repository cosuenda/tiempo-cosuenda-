<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meteo Cosuenda</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>🌤️ Meteo Cosuenda</h1>
  <p>Estación Meteorológica Profesional</p>
</header>

<div class="container">

  <div class="card">
    <h2>Temperatura</h2>
    <div id="tempBig" class="bigTemp">--</div>
    <div id="sensacion">Sensación térmica: --</div>
    <div id="tempMin">Mínima diaria: --</div>
    <div id="tempMax">Máxima diaria: --</div>
  </div>

  <div class="card">
    <h2>Humedad</h2>
    <div id="hum" class="bigNumber">--</div>
  </div>

  <div class="card">
    <h2>Viento (km/h)</h2>
    <div id="windValue" class="bigNumber">--</div>
    <div id="windMaxBig">--</div>
    <div id="windDirText">Dirección: --</div>

    <div class="rosa">
      <div id="flechaViento" class="flecha"></div>
    </div>
  </div>

  <div class="card">
    <h2>Lluvia</h2>

    <div>
      Hoy
      <div id="rainValue" class="bigNumber">--</div>
      <div class="rainBars">
        <div id="rain" class="bar"></div>
      </div>
    </div>

    <div>
      Mes
      <div id="rainMonthValue" class="bigNumber">--</div>
      <div class="rainBars">
        <div id="rainMonth" class="bar"></div>
      </div>
    </div>

    <div>
      Año
      <div id="rainYearValue" class="bigNumber">--</div>
      <div class="rainBars">
        <div id="rainYear" class="bar"></div>
      </div>
    </div>

  </div>

  <div class="card">
    <h2>Presión</h2>
    <div id="press" class="bigNumber">--</div>
  </div>

  <div class="card">
    <h2>Índice UV</h2>
    <div id="uv" class="bigNumber">--</div>
  </div>

  <div class="card">
    <h2>Radiación Solar</h2>
    <div id="solar" class="bigNumber">--</div>
  </div>

</div>

<div id="ultimaActualizacion">
  Última actualización: --
</div>

<script src="script.js"></script>

</body>
</html>
